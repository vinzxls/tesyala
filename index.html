<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga untuk Tesya 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-particles" id="particles"></div>
    
    <div class="falling-petals" id="fallingPetals"></div>

    <div class="main-container">
        <!-- Glowing aura behind the flower -->
        <div class="flower-glow"></div>

        <!-- The Flower -->
        <div class="flower-wrapper" id="flowerWrapper">
            <div class="flower">
                <!-- Outer petals layer -->
                <div class="petal-layer outer-layer">
                    <div class="petal petal-1"></div>
                    <div class="petal petal-2"></div>
                    <div class="petal petal-3"></div>
                    <div class="petal petal-4"></div>
                    <div class="petal petal-5"></div>
                    <div class="petal petal-6"></div>
                    <div class="petal petal-7"></div>
                    <div class="petal petal-8"></div>
                </div>
                <!-- Middle petals layer -->
                <div class="petal-layer middle-layer">
                    <div class="petal mid-petal mid-1"></div>
                    <div class="petal mid-petal mid-2"></div>
                    <div class="petal mid-petal mid-3"></div>
                    <div class="petal mid-petal mid-4"></div>
                    <div class="petal mid-petal mid-5"></div>
                    <div class="petal mid-petal mid-6"></div>
                </div>
                <!-- Inner petals layer -->
                <div class="petal-layer inner-layer">
                    <div class="petal inner-petal inner-1"></div>
                    <div class="petal inner-petal inner-2"></div>
                    <div class="petal inner-petal inner-3"></div>
                    <div class="petal inner-petal inner-4"></div>
                    <div class="petal inner-petal inner-5"></div>
                </div>
                <!-- Center of the flower -->
                <div class="flower-center">
                    <div class="center-inner"></div>
                    <div class="center-sparkle s1"></div>
                    <div class="center-sparkle s2"></div>
                    <div class="center-sparkle s3"></div>
                    <div class="center-sparkle s4"></div>
                </div>
            </div>

            <!-- Stem -->
            <div class="stem-container">
                <div class="stem"></div>
                <div class="leaf leaf-left">
                    <div class="leaf-vein"></div>
                </div>
                <div class="leaf leaf-right">
                    <div class="leaf-vein"></div>
                </div>
            </div>
        </div>

        <!-- Message -->
        <div class="message-container" id="message">
            <div class="message-decoration left">✿</div>
            <h1 class="title">Untuk Tesya</h1>
            <p class="subtitle">Bunga ini mekar untukmu &#x1F338;</p>
            <div class="heart-line">
                <span class="heart">♥</span>
                <span class="heart">♥</span>
                <span class="heart">♥</span>
            </div>
            <div class="message-decoration right">✿</div>
        </div>
    </div>

    <!-- Floating hearts -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <script src="script.js"></script>
</body>
</html>
